name: Lint

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - '.textlintrc.json'
      - '.markdownlint.jsonc'
      - 'prh.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/lint.yml'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  textlint:
    name: textlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - uses: tsuyoshicho/action-textlint@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          textlint_flags: "docs/**/*.md README.md"

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-markdownlint@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          markdownlint_flags: "docs/**/*.md README.md"
