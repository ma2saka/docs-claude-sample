version: 1
# 表現スタイル検出ルール
#
# このファイルは用語統一ではなく、文体の偏り（身体性の比喩・評価的な誘導・
# 反復しがちな定型句）を検出するための prh ルール集です。検出された箇所は、
# 実行場所・通信経路・権限範囲・利用場面などを平易な言葉で書き直す素材、
# あるいは事実記述や動作側の言い回しに置き換える素材として扱います。
#
# 運用上の注意:
# - 読者の直感に直接貢献している 1〜2 本の比喩、具体的な根拠（速度・費用・
#   失敗パターン・権限の広がり）に紐付いた警告は対象外です。該当段落は
#   `<!-- textlint-disable prh -->` / `<!-- textlint-enable prh -->` で
#   囲んで除外してください。
# - `expected` 側に注釈を埋めているため、このルールを読み込んだ状態で
#   `npm run lint:fix` を実行すると本文に注釈語が混入します。検出のみの
#   用途で読み込み、書き直しは手作業で進めてください。

rules:
  # === 身体・動作系 ===
  - expected: $1（身体性の比喩。「ファイルを読み書きする／編集する」等で言い換え）
    patterns:
      - /(ファイル[をに]触[れるっ])/
  - expected: $1（身体性の比喩。実行場所／権限／経路を平易に直接言う）
    patterns:
      - /(腕と足|手と目)/

  # === 親族・集合系 ===
  - expected: $1（親族・集合系の比喩。製品名／モデル名で書き直す）
    patterns:
      - /(兄弟|ファミリー|顔ぶれ)/

  # === 空間・位置系 ===
  - expected: $1（空間・位置の比喩。「比較」「一覧」「役割分担」等で置き換え検討）
    patterns:
      - /(横並び|位置関係|入口の性格)/

  # === 評価・誘導系 ===
  # 具体的な根拠と紐付かない評価ラベル。根拠（速度・費用・失敗パターン）と
  # セットになっているものは対象外（段落単位で disable する）。
  - expected: $1（評価語での誘導。「〜の場面で選ぶ」「〜に向く」で利用場面を書く）
    patterns:
      - /(最後の(?:手段|選択肢)|せざるを得な[いく]|できる限り避け|温存する|使うべきでない)/

  # === 定型句の反復 ===
  # 章をまたぐ反復で「AIっぽさ」を作る締めの定型句。語そのものを禁じる意図
  # ではなく、章内・章間で繰り返し当たったときに、根拠側・動作側で書き直す
  # 素材として扱います。WRITING_GUIDE「9. 定型句の反復」も参照。
  - expected: $1（定型句の反復。事実記述や「〜から始めると」等、動作・根拠側で書き直す）
    patterns:
      - /(が実用的です|が現実的です)/
  - expected: $1（定型句の反復。「確認しておきたい／確認したい」や「ここで前提となる」「要点」へ）
    patterns:
      - /(押さえておきたい|押さえておく必要があり)/
  - expected: $1（定型句の反復。章内連鎖時は「です」「に相当します」「と同じ仕組みです」等で散らす。「にあたって(は)」の意味は対象外）
    patterns:
      - /(にあたります|にあたる|にあたり)/
